<div class="game-container">
  <h1>Snake Game</h1>
  <div class="score">Score: {{ score() }}</div>

  <div class="board" [style.gridTemplateColumns]="'repeat(' + boardSize + ', 1fr)'">
    <ng-container *ngFor="let y of getBoardRows()">
      <ng-container *ngFor="let x of getBoardCols()">
        <div class="cell"
             [class.snake]="isSnakeSegment(x, y)"
             [class.snake-head]="isSnakeSegment(x, y) && snake()[0].x === x && snake()[0].y === y"
             [class.food]="isFood(x, y)">
        </div>
      </ng-container>
    </ng-container>
  </div>

  <div class="game-over-overlay" *ngIf="isGameOver()">
    <div class="game-over-message">
      <h2>Game Over!</h2>
      <p>Your score: {{ score() }}</p>
      <button (click)="startGame()">Play Again (Enter)</button>
    </div>
  </div>
</div>
